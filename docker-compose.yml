services:
  dashboard:
    build: .
    container_name: quantum-risk-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./dashboard:/app/dashboard
      - ./scripts:/app/scripts
      - ./.streamlit:/app/.streamlit
      - ./reports:/app/reports
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  scheduler:
    build: .
    container_name: quantum-risk-scheduler
    command: python scripts/scheduler.py
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./reports:/app/reports
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
